---
- name: Install Docker and run Nginx with Docker Compose
  hosts: web
  become: yes

  vars:
    app_dir: /opt/homework21-nginx

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present

    - name: Create Docker keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Get system architecture
      ansible.builtin.command: dpkg --print-architecture
      register: dpkg_arch
      changed_when: false

    - name: Add Docker apt repository
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ dpkg_arch.stdout }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Install Docker Engine and Docker Compose plugin
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Start and enable Docker service
      ansible.builtin.service:
        name: docker
        state: started
        enabled: yes

    - name: Create application directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        mode: "0755"

    - name: Create Docker Compose file for Nginx
      ansible.builtin.copy:
        dest: "{{ app_dir }}/docker-compose.yml"
        mode: "0644"
        content: |
          services:
            nginx:
              image: nginx:latest
              container_name: homework21-nginx
              restart: always
              ports:
                - "80:80"

    - name: Pull Nginx Docker image
      ansible.builtin.command: docker pull nginx:latest
      register: nginx_pull
      changed_when: "'Downloaded newer image' in nginx_pull.stdout"

    - name: Run Nginx using Docker Compose
      ansible.builtin.command: docker compose up -d
      args:
        chdir: "{{ app_dir }}"

    - name: Show running Docker containers
      ansible.builtin.command: docker ps
      register: docker_ps
      changed_when: false

    - name: Print Docker containers
      ansible.builtin.debug:
        var: docker_ps.stdout_lines