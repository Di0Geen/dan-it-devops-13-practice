---
- name: Install Jenkins and nginx reverse proxy
  hosts: jenkins_master
  become: true

  tasks:
    - name: Update apt cache
      apt:
        update_cache: true

    - name: Install required packages
      apt:
        name:
          - fontconfig
          - openjdk-21-jre
          - ca-certificates
          - curl
          - gnupg
          - nginx
        state: present

    - name: Create apt keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Jenkins repository key
      get_url:
        url: https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key
        dest: /etc/apt/keyrings/jenkins-keyring.asc
        mode: "0644"

    - name: Add Jenkins apt repository
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/"
        filename: jenkins
        state: present

    - name: Update apt cache after adding Jenkins repo
      apt:
        update_cache: true

    - name: Install Jenkins
      apt:
        name: jenkins
        state: present

    - name: Enable and start Jenkins
      systemd:
        name: jenkins
        enabled: true
        state: started

    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Add nginx Jenkins reverse proxy config
      template:
        src: templates/jenkins.conf.j2
        dest: /etc/nginx/sites-available/jenkins.conf
        mode: "0644"

    - name: Enable Jenkins nginx site
      file:
        src: /etc/nginx/sites-available/jenkins.conf
        dest: /etc/nginx/sites-enabled/jenkins.conf
        state: link

    - name: Test nginx configuration
      command: nginx -t
      changed_when: false

    - name: Restart nginx
      systemd:
        name: nginx
        enabled: true
        state: restarted
